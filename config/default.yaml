# Tashi Swarm — Default Configuration
# Override per-scenario with config/scenarios/*.yaml

simulation:
  timestep: 32            # ms per Webots step
  seed: 42                # deterministic RNG seed
  max_steps: null          # null = run indefinitely

grid:
  cell_size: 5.0           # meters per cell
  width: 100               # cells in X
  height: 100              # cells in Y
  world_bounds: [0.0, 500.0, 0.0, 500.0]  # xmin, xmax, ymin, ymax (meters)

motion:
  drone_max_speed: 8.0     # m/s

network:
  default_open: true       # unregistered links deliver with 0 loss
  loss_factor: 0.01        # baseline packet loss
  latency_factor: 2.0      # ms per hop
  asymmetry_threshold: 20.0

vertex:
  host: localhost
  port: 7000
  cluster_name: swarm
  replication_factor: 3
  auth_token: ""

roles:
  heartbeat_interval: 5.0          # seconds
  peer_remove_timeout: 30.0        # seconds
  relay_insertion_distance: 8.0    # meters
  state_snapshot_interval: 30.0    # seconds
  reliable_max_retries: 3
  reliable_ack_timeout: 1.0        # seconds
  discover_interval_ticks: 3

targets:
  confidence_threshold: 0.7
  cleanup_timeout: 300             # seconds
  assign_timeout: 45.0             # seconds
  detection_distance: 12.0         # meters
  rescue_arrival_distance: 1.0     # meters
  default_victims:
    - [75.0, 75.0, 0.0]
    - [180.0, 120.0, 0.0]
    - [320.0, 90.0, 0.0]

handoff:
  battery_threshold: 20.0
  bid_timeout: 10.0

exploration:
  broadcast_interval: 5.0         # seconds between gossip updates
  claim_timeout: 10.0             # seconds before stale claim expires
