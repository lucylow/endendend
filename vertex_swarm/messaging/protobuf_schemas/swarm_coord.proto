syntax = "proto3";

package vertex_swarm.coord;

enum Role {
  ROLE_UNKNOWN = 0;
  ROLE_EXPLORER = 1;
  ROLE_RELAY = 2;
  ROLE_RESCUER = 3;
  ROLE_STANDBY = 4;
}

message SignedStateUpdate {
  string channel = 1;
  string key = 2;
  bytes value = 3;
  bytes signature = 4;
  uint64 lamport_clock = 5;
  string signer_id = 6;
}

message RoleBid {
  string bidder_id = 1;
  Role role = 2;
  float utility = 3;
  bytes signature = 4;
}

message ChainProposal {
  repeated string ordered_drone_ids = 1;
  uint64 lamport_clock = 2;
  string proposer_id = 3;
  bytes signature = 4;
}
