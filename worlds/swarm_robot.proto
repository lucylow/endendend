# PROTO snippet for instanced Track 2 drones (Webots R2024a style).
# Reference from world files via EXTERNPROTO or inline; tune fields per sim.

PROTO SwarmRobot [
  field SFString droneId "drone0"
  field SFFloat initialDepth 0.0
]
{
  Transform {
    translation 0 1 0
    children [
      Robot {
        name IS droneId
        controller "void"
        supervisor FALSE
        customData IS droneId
        description "ROS 2 namespace drone; pair with ros2 launch endendend_launch swarm_track2_launch.py"
      }
    ]
  }
}
