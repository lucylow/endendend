#VRML_SIM R2024a utf8
# YOLO-style high-visibility victim (orange torso) + optional debris — no external textures.

PROTO Victim [
  field SFVec3f position 0 0 0
  field SFRotation rotation 0 1 0 0
]
{
  Transform {
    translation IS position
    rotation IS rotation
    children [
      Solid {
        translation 0 0.6 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.95 0.35 0.05
              roughness 0.65
              metalness 0.0
            }
            geometry Cylinder {
              radius 0.18
              height 0.85
            }
          }
        ]
        boundingObject Cylinder {
          radius 0.18
          height 0.85
        }
        physics Physics {
          density 400
        }
      }
      Solid {
        translation 0 1.18 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.82 0.62 0.48
              roughness 0.9
              metalness 0.0
            }
            geometry Sphere {
              radius 0.14
            }
          }
        ]
        boundingObject Sphere {
          radius 0.14
        }
        physics Physics {
          density 200
        }
      }
      Solid {
        translation 0.12 0.35 0.12
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.35 0.35 0.36
              roughness 0.95
              metalness 0.0
            }
            geometry Box {
              size 0.45 0.55 0.42
            }
          }
        ]
        boundingObject Box {
          size 0.45 0.55 0.42
        }
        physics Physics {
          density 800
        }
      }
    ]
  }
}
